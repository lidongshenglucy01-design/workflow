format = """$username$directory$git_branch$git_status$cmd_duration$line_break$character"""

[username]
show_always = true
style_user = "bold #81A1C1"
format = "[$user]($style) "

[directory]
style = "bold #88C0D0"
truncation_length = 3
format = "in [$path]($style) "

[git_branch]
symbol = " "
style = "bold #A3BE8C"

[git_status]
style = "bold #BF616A"

[cmd_duration]
min_time = 2000
style = "bold #EBCB8B"
format = "took [$duration]($style) "

[character]
success_symbol = "[❯](bold #88C0D0)"
error_symbol = "[❯](bold #BF616A)"
