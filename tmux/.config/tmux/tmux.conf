# Prefix 键改为 Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 基础设置
set -g default-shell /opt/homebrew/bin/fish
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# 颜色支持
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# vim 风格 pane 切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 分割 pane（用更直觉的按键）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane 跨 window 移动（你的核心需求）
bind b break-pane
bind B command-prompt -p "join pane from (window.pane):" "join-pane -s :%%"

# 快速重载配置
bind r source-file ~/.config/tmux/tmux.conf \; display "配置已重载"

# Nord 主题配色
set -g status-style bg="#2E3440",fg="#D8DEE9"
set -g status-left "#[bg=#5E81AC,fg=#2E3440,bold] #S #[default] "
set -g status-right "#[bg=#4C566A,fg=#D8DEE9] %H:%M "
set -g window-status-format "#[fg=#4C566A] #I:#W "
set -g window-status-current-format "#[bg=#88C0D0,fg=#2E3440,bold] #I:#W "
set -g pane-border-style fg="#4C566A"
set -g pane-active-border-style fg="#88C0D0"

# 浮动终端 (popup) - 保留状态
bind g if-shell '[ "#{session_name}" = "popup" ]' 'detach-client' 'display-popup -E -w 80% -h 80% "tmux attach-session -t popup || tmux new-session -s popup"'

# ── Vi 模式复制 ──────────────────────────────────────
set -g mode-keys vi

# 进入复制模式
bind Enter copy-mode

# vi 风格选择
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# y 复制到系统剪贴板
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"

# 鼠标选中自动复制
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
