# Shell
shell /opt/homebrew/bin/fish

# 字体
font_family      JetBrainsMono Nerd Font
font_size        14.0

# 窗口
window_padding_width 8

# 关闭时不提示
confirm_os_window_close 0

# Shift+Enter 发送换行（终端默认不区分 Shift+Enter 和 Enter）
map shift+enter send_text normal,application \x0a
include nord.conf


# BEGIN_KITTY_THEME
# Nord
include current-theme.conf
# END_KITTY_THEME